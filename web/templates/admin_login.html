<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Tu Tiên Bot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    color: #e8e8f0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .box {
    background: #12121a;
    border: 1px solid #2a2a40;
    border-radius: 16px;
    padding: 40px 32px;
    width: 100%;
    max-width: 360px;
  }
  .logo { text-align: center; font-size: 2.5rem; margin-bottom: 8px; }
  h2 { text-align: center; color: #FFD700; margin-bottom: 4px; font-size: 1.2rem; }
  .sub { text-align: center; color: #606080; font-size: 0.8rem; margin-bottom: 28px; }
  label { display: block; font-size: 0.8rem; color: #9090a0; margin-bottom: 6px; }
  input {
    width: 100%;
    background: #1a1a2e;
    border: 1px solid #2a2a40;
    border-radius: 8px;
    color: #e8e8f0;
    padding: 11px 14px;
    font-size: 0.95rem;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #FFD700; }
  button {
    width: 100%;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  .error {
    background: rgba(255,100,100,0.1);
    border: 1px solid rgba(255,100,100,0.3);
    color: #ff8888;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.85rem;
    margin-bottom: 16px;
    text-align: center;
  }
  .back { text-align: center; margin-top: 16px; }
  .back a { color: #606080; font-size: 0.8rem; text-decoration: none; }
  .back a:hover { color: #FFD700; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">⚔️</div>
  <h2>Tu Tiên Bot</h2>
  <p class="sub">Admin Panel — Đăng nhập để tiếp tục</p>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST">
    <label>Tài khoản</label>
    <input type="text" name="username" placeholder="Nhập tài khoản..." autocomplete="off" autofocus>
    <label>Mật khẩu</label>
    <input type="password" name="password" placeholder="Nhập mật khẩu...">
    <button type="submit">🔐 Đăng Nhập</button>
  </form>
  <div class="back"><a href="/">← Về trang chủ</a></div>
</div>
</body>
</html>
