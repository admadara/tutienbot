<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Tu Tiên Bot{% endblock %}</title>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a2e;
    --gold: #FFD700;
    --gold2: #FFA500;
    --text: #e8e8f0;
    --text2: #9090a0;
    --border: #2a2a40;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
  }
  /* NAV */
  nav {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--gold);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-links { display: flex; gap: 16px; margin-left: auto; }
  .nav-links a {
    color: var(--text2);
    text-decoration: none;
    font-size: 0.9rem;
    padding: 6px 12px;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .nav-links a:hover, .nav-links a.active {
    color: var(--gold);
    background: rgba(255,215,0,0.1);
  }
  /* MAIN */
  main { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  /* CARD */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text2);
    margin-bottom: 12px;
  }
  /* BADGE */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    background: rgba(255,215,0,0.15);
    color: var(--gold);
    border: 1px solid rgba(255,215,0,0.3);
  }
  /* GRID STATS */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
  }
  .stat-box {
    background: var(--bg3);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .stat-box .label { font-size: 0.7rem; color: var(--text2); margin-bottom: 4px; }
  .stat-box .val { font-size: 1.1rem; font-weight: 700; color: var(--gold); }
  /* PROGRESS */
  .bar-wrap { background: var(--bg3); border-radius: 99px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--gold2), var(--gold)); transition: width 0.5s; }
  /* SEARCH */
  .search-box {
    display: flex; gap: 8px; margin-bottom: 20px;
  }
  .search-box input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 0.95rem;
    outline: none;
  }
  .search-box input:focus { border-color: var(--gold); }
  .search-box button {
    background: var(--gold);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .search-box button:hover { opacity: 0.85; }
  /* TABLE */
  .rank-table { width: 100%; border-collapse: collapse; }
  .rank-table th {
    text-align: left;
    font-size: 0.75rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .rank-table td {
    padding: 12px;
    border-bottom: 1px solid rgba(42,42,64,0.5);
    font-size: 0.9rem;
  }
  .rank-table tr:hover td { background: rgba(255,215,0,0.03); }
  .rank-num { font-weight: 700; color: var(--text2); width: 36px; }
  .rank-1 .rank-num { color: #FFD700; font-size: 1.1rem; }
  .rank-2 .rank-num { color: #C0C0C0; }
  .rank-3 .rank-num { color: #CD7F32; }
  /* TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab {
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text2);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .tab.active, .tab:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(255,215,0,0.08);
  }
  /* LOADING */
  .loading { text-align: center; padding: 40px; color: var(--text2); }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* ERROR */
  .error-box {
    text-align: center; padding: 40px; color: #ff6b6b;
    background: rgba(255,107,107,0.05);
    border: 1px solid rgba(255,107,107,0.2);
    border-radius: var(--radius);
  }
  /* RESPONSIVE */
  @media(max-width: 600px) {
    .stat-grid { grid-template-columns: repeat(3, 1fr); }
    nav { padding: 10px 14px; }
    .nav-links a { padding: 5px 8px; font-size: 0.8rem; }
  }
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/">⚔️ Tu Tiên Bot</a>
  <div class="nav-links">
    <a href="/" id="nav-home">Trang Chủ</a>
    <a href="/bxh" id="nav-bxh">🏆 BXH</a>
  </div>
</nav>
<main>
{% block content %}{% endblock %}
</main>
<script>
  // Highlight active nav
  const path = location.pathname;
  if (path === '/') document.getElementById('nav-home').classList.add('active');
  if (path === '/bxh') document.getElementById('nav-bxh').classList.add('active');
</script>
</body>
</html>
